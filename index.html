<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriLog">
<meta name="theme-color" content="#080810">
<title>NutriLog · Paola</title>

<style>
:root{
  --ink:#080810;--ink2:#0E0E1C;--ink3:#141428;
  --surface:#1C1C30;--raised:#222238;
  --line:#2A2A44;--line2:#343452;
  --muted:#5A5A80;--sub:#A8A8D0;--body:#D0D0F0;--bright:#F0EEFF;
  --mint:#64E0A0;--amber:#FFB347;--coral:#FF6B6B;--sky:#60C4FF;--lilac:#C084FC;--gold:#FFD700;
  --prot:#64E0A0;--kcal:#C084FC;--carb:#FFB347;--gras:#60C4FF;
  --r:14px;--rsm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--ink);color:var(--body);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;overflow:hidden;font-size:16px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:2px}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative}

/* ── CONFETTI / CELEBRATION ── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999;display:none}
.celebrate-toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:#FFFFFF;
  border:2.5px solid #F5A623;border-radius:24px;
  padding:28px 32px;text-align:center;z-index:1000;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 20px 60px rgba(0,0,0,.2);max-width:300px;width:90%;
}
.celebrate-toast.show{transform:translate(-50%,-50%) scale(1)}
.ct-emoji{font-size:52px;margin-bottom:10px}
.ct-title{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;font-size:22px;font-weight:900;color:#1A1A2E;margin-bottom:6px}
.ct-msg{font-size:14px;color:#6B7280;line-height:1.5;margin-bottom:16px;font-weight:500}
.ct-xp{font-size:18px;font-weight:800;color:#0E9975;margin-bottom:14px}
.ct-close{background:#FF6B6B;border:none;border-radius:12px;padding:10px 24px;color:#FFF;font-size:14px;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif}

/* ── HEADER ── */
/* ── HEADER ── */
.hdr{flex-shrink:0;background:var(--ink2);border-bottom:1px solid var(--line);padding:12px 18px 12px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.logo{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;font-size:22px;font-weight:800;color:var(--bright);letter-spacing:-.5px}
.logo em{color:var(--prot);font-style:normal}
.hdr-badges{display:flex;gap:8px;align-items:center}
.badge-fire{font-size:13px;font-weight:700;color:#FF6B6B;background:#FFF0F0;border-radius:20px;padding:5px 12px}
.badge-xp{font-size:12px;font-weight:600;color:var(--sub);background:var(--raised);border-radius:20px;padding:5px 12px}
/* ── MACRO ROWS ── */
.macro-rows{display:flex;flex-direction:column;gap:7px}
.mr-row{display:flex;align-items:center;gap:10px}
.mr-icon{font-size:14px;width:20px;flex-shrink:0;text-align:center}
.mr-name{font-size:12px;color:var(--sub);width:56px;flex-shrink:0;font-weight:700}
.mr-track{flex:1;height:7px;background:#F0F2F5;border-radius:4px;overflow:hidden}
.mr-fill{height:100%;border-radius:4px;transition:width .5s ease;min-width:3px}
.mr-val{font-size:13px;font-weight:800;width:78px;text-align:right;flex-shrink:0;display:flex;gap:2px;justify-content:flex-end;align-items:baseline;color:var(--bright)}
.mr-goal{font-size:10px;color:var(--muted);font-weight:500}
.hdr-right{display:flex;align-items:center;gap:10px}
.streak-badge{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(255,107,107,.15),rgba(255,179,71,.15));border:1px solid rgba(255,179,71,.3);border-radius:20px;padding:5px 12px}
.streak-fire{font-size:16px}
.streak-num{font-family:serif;font-size:16px;color:var(--amber);font-weight:700}
.streak-lbl{font-size:10px;color:var(--amber);opacity:.8}
.xp-badge{display:flex;align-items:center;gap:5px;background:rgba(192,132,252,.1);border:1px solid rgba(192,132,252,.3);border-radius:20px;padding:5px 12px}
.xp-num{font-size:15px;color:var(--lilac)}
.xp-lbl{font-size:10px;color:var(--lilac);opacity:.8}

/* level row CSS removed - level in badge */

/* macro rings */
/* macro grid removed - using macro-rows */

/* ── PAGES ── */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px 16px 90px;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}

/* ── BOTTOM NAV ── */
.bnav{display:flex;background:var(--ink2);border-top:1px solid var(--line);padding:7px 0 max(7px,env(safe-area-inset-bottom));flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 0;border:none;background:none;color:var(--muted);transition:color .2s}
.nb.active{color:var(--mint)}.nb-ico{font-size:21px}
.nb-lbl{font-size:9px;letter-spacing:.3px;text-transform:uppercase;font-weight:700;color:inherit}

/* ── TODAY ── */
.meal-section-label{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#9EA3AE;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.meal-section-label::after{content:'';flex:1;height:1px;background:#E5E7EB}

.mblock{margin-bottom:18px}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:0;padding:0 2px}
.mpill{display:inline-flex;align-items:center;gap:7px;background:#FFFFFF;border:1.5px solid var(--line);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;color:var(--sub)}
.mpill .dot{width:7px;height:7px;border-radius:50%;background:#D1D5DB;transition:background .3s}
.mpill.has .dot{background:var(--prot);box-shadow:0 0 6px rgba(255,107,107,.4)}
.mpill.has{color:var(--bright);border-color:rgba(255,107,107,.25);background:#FFF}
.mtag{font-size:12px;color:var(--muted);font-weight:600}
.mcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}

/* portion goals bar */
/* ── PORTION CHIPS ── */
.portion-line{padding:8px 14px;background:#F9FAFB;border-bottom:1px solid #F3F4F6;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.pchip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;border:1.5px solid;white-space:nowrap}
.p-done{font-size:11px;font-weight:800;color:#0E9975;margin-left:auto}
.pg-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--line2);transition:all .3s}
.pg-dot.filled{border-color:var(--prot);background:var(--prot)}

.erow{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);gap:10px}
.erow:last-child{border-bottom:none}
.ename{flex:1;font-size:14px;color:var(--bright);line-height:1.3}
.ecat{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500}
.etags{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px}
.tp{background:rgba(100,224,160,.12);color:var(--mint)}
.tk{background:rgba(192,132,252,.12);color:var(--lilac)}
.tc{background:rgba(255,179,71,.12);color:var(--amber)}
.tf{background:rgba(96,196,255,.12);color:var(--sky)}
.xbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:19px;line-height:1;padding:3px 6px;transition:color .15s}
.xbtn:hover{color:var(--coral)}
.emeal{padding:12px 16px;font-size:12px;color:#9EA3AE;font-weight:500}
.mtots{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;padding:0 2px}
.tchip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:#FFFFFF;border:1.5px solid var(--line)}
.abtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:#F9FAFB;border:1.5px dashed #D1D5DB;border-radius:var(--rsm);padding:11px;color:#9EA3AE;font-size:13px;font-weight:700;cursor:pointer;margin-top:0;transition:all .2s;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif}
.abtn:hover{border-color:var(--prot);color:var(--prot);background:#FFF0F0}
.drink-reminder{margin-top:0;padding:9px 16px;background:#EFF9FF;border-top:1px solid #E0F4FF;font-size:13px;color:#2E86C1;font-weight:600}

/* ── SUPPLEMENTS ── */
.sup-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.sup-head{padding:12px 16px;background:var(--raised);display:flex;align-items:center;justify-content:space-between}
.sup-title{font-size:14px;font-weight:800;color:var(--bright)}
.sup-prog{font-size:12px;color:var(--muted);font-weight:600}
.sup-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #F9FAFB;gap:13px;cursor:pointer;transition:background .15s;-webkit-user-select:none;user-select:none}
.sup-row:last-child{border-bottom:none}
.sup-row.done{background:rgba(100,224,160,.04)}
.sup-check{width:26px;height:26px;border-radius:50%;border:2px solid #D1D5DB;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s;font-size:13px;color:transparent}
.sup-row.done .sup-check{background:var(--mint);border-color:var(--mint);color:var(--ink)}
.sup-info{flex:1}
.sup-name{font-size:14px;font-weight:700;color:var(--bright)}
.sup-row.done .sup-name{color:var(--mint)}
.sup-when{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}
.sup-dose{font-size:12px;color:#D4750A;font-weight:700;margin-top:1px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.overlay.open{display:flex}
.sheet{background:var(--ink2);border:1px solid var(--line);border-radius:22px 22px 0 0;padding:8px 18px 28px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.handle{width:40px;height:4px;border-radius:2px;background:var(--line2);margin:0 auto 16px}
.stitle{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Georgia,serif;font-size:20px;color:var(--bright);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.cbtn{background:var(--raised);border:1px solid var(--line);color:var(--sub);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.swrap{display:flex;gap:8px;margin-bottom:10px}
.sin{flex:1;background:#F7F8FA;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;color:var(--bright);font-size:15px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;font-weight:600}
.sin:focus{outline:none;border-color:var(--prot);background:#FFF}.sin::placeholder{color:#C0C6D0}
.sgo{background:var(--prot);border:none;border-radius:12px;padding:11px 14px;color:#FFF;font-size:13px;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;white-space:nowrap}
.rwrap{max-height:200px;overflow-y:auto;margin-bottom:12px}
.ritem{padding:11px 13px;background:#F7F8FA;border-radius:10px;margin-bottom:5px;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.ritem:hover{border-color:var(--prot);background:#FFF0F0}
.rn{font-size:14px;font-weight:700;color:var(--bright)}.rs{font-size:11px;color:var(--sub);margin-top:2px;font-weight:500}.rcat{font-size:10px;color:var(--sub);background:#E5E7EB;padding:2px 7px;border-radius:6px;font-weight:600}
.divl{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase}
.divl::before,.divl::after{content:'';flex:1;height:1px;background:var(--line)}
.flbl{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);margin-bottom:5px;display:block;font-weight:600}
.fin{width:100%;background:#F7F8FA;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;color:var(--bright);font-size:15px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;font-weight:600}
.fin:focus{outline:none;border-color:var(--mint)}
.fg{margin-bottom:10px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sub-btn{width:100%;background:var(--amber);border:none;border-radius:14px;padding:14px;color:var(--ink);font-size:15px;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;margin-top:6px;transition:opacity .2s}
.sub-btn:hover{opacity:.88}

/* ── SUMMARY ── */
.ndates{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.narr{background:var(--raised);border:1px solid var(--line);color:var(--sub);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
.ndlbl{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Georgia,serif;font-size:18px;color:var(--bright)}
.swrap2{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.sarc{width:130px;height:130px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid;margin-bottom:12px;background:#FFFFFF;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.sarc.great{border-color:#0E9975;box-shadow:0 4px 20px rgba(14,153,117,.15)}
.sarc.good{border-color:#F5A623;box-shadow:0 4px 20px rgba(245,166,35,.15)}
.sarc.poor{border-color:#FF6B6B;box-shadow:0 4px 20px rgba(255,107,107,.15)}
.snum{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;font-size:42px;font-weight:900;line-height:1}
.snum.great{color:#0E9975}.snum.good{color:#F5A623}.snum.poor{color:#FF6B6B}
.sden{font-size:12px;color:var(--muted);font-weight:600}
.smsg{font-size:14px;color:var(--sub);text-align:center;max-width:280px;line-height:1.5;font-weight:600}
.mbars{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
.mbrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.mbrow:last-child{margin-bottom:0}
.mbn{font-size:13px;color:var(--body);width:82px;flex-shrink:0;font-weight:700}
.mb-sub{font-size:10px;color:var(--muted);display:block;font-weight:500}
.mbtrack{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.mbfill{height:100%;border-radius:5px;transition:width .6s ease;min-width:4px}
.mbval-wrap{width:88px;flex-shrink:0;text-align:right}
.mbval{font-size:14px;font-weight:800;display:block}
.mbpct{font-size:10px;color:var(--muted);display:block;font-weight:500}
.mdet{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.mdh{padding:12px 16px;background:var(--raised);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.mdm{padding:11px 16px;border-bottom:1px solid var(--line)}
.mdm:last-child{border-bottom:none}
.mdmn{font-size:14px;font-weight:600;color:var(--bright);margin-bottom:3px}
.mdmi{font-size:12px;color:var(--sub);line-height:1.6}
.fbcard{border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.fbcard.great{background:#F0FBF8;border:1.5px solid #A8E6D8}
.fbcard.warn{background:#FFFBEB;border:1.5px solid #FCD34D}
.fbcard.bad{background:#FFF0F0;border:1.5px solid #FCA5A5}
.fbt{font-size:14px;font-weight:800;margin-bottom:5px}
.fbt.great{color:#065F46}.fbt.warn{color:#92400E}.fbt.bad{color:#991B1B}
.fbm{font-size:13px;color:var(--body);line-height:1.6;font-weight:500}

/* ── ACHIEVEMENTS ── */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ach-card{background:#FFFFFF;border:1.5px solid var(--line);border-radius:var(--r);padding:14px;text-align:center;transition:all .3s;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.ach-card.unlocked{border-color:#F5A623;background:linear-gradient(135deg,#FFFBEB,#FFF);box-shadow:0 4px 16px rgba(245,166,35,.15)}
.ach-card.locked{opacity:.4;filter:grayscale(.8)}
.ach-ico{font-size:32px;margin-bottom:6px}
.ach-name{font-size:13px;font-weight:700;color:var(--bright);margin-bottom:3px}
.ach-card.locked .ach-name{color:var(--muted)}
.ach-desc{font-size:11px;color:var(--sub);line-height:1.4}
.ach-badge{position:absolute;top:8px;right:8px;font-size:12px}

/* ── HISTORY ── */
.frow{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fil{padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:var(--ink3);color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.fil.active{background:#FF6B6B;border-color:#FF6B6B;color:#FFFFFF}
.ccard{background:#FFFFFF;border:none;border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.clbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.bchart{display:flex;align-items:flex-end;gap:4px;height:60px}
.bccol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bcbar{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.bcd{font-size:9px;color:var(--muted)}
.hday{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s}
.hday:hover{border-color:var(--mint)}
.hdscore{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Georgia,serif;font-size:15px;flex-shrink:0}
.hdinfo{flex:1;min-width:0}
.hddate{font-size:14px;font-weight:600;color:var(--bright)}
.hdm{font-size:12px;color:var(--sub);margin-top:2px}
.hdbars{display:flex;gap:4px;margin-top:7px}
.hb{height:4px;flex:1;border-radius:2px;background:var(--line);overflow:hidden}
.hbf{height:100%;border-radius:2px}

/* ── REPORT ── */
.rtop{background:linear-gradient(135deg,#FFF0F0,#FFF6ED);border:1.5px solid #FFD6D6;border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.rtname{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;font-size:22px;font-weight:900;color:var(--bright);margin-bottom:2px}
.rtsub{font-size:12px;color:var(--sub);margin-bottom:14px;font-weight:500}
.rtgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rtcell{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 13px}
.rtcl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.rtcv{font-size:16px;font-weight:700;color:var(--bright);margin-top:2px}
.srow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.sbox{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px;text-align:center}
.sv{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Georgia,serif;font-size:24px}.sl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.rsec{background:#FFFFFF;border:none;border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.rsh{padding:12px 16px;background:#F9FAFB;border-bottom:1px solid #F3F4F6;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#9EA3AE}
.rsr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #F9FAFB;font-size:13px;font-weight:500;color:var(--body)}
.rsr:last-child{border-bottom:none}.rsv{font-weight:800}
.pbtn{width:100%;background:#FF6B6B;border:none;border-radius:14px;padding:14px;color:#FFF;font-size:15px;font-weight:800;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;margin-bottom:9px;box-shadow:0 4px 14px rgba(255,107,107,.3)}
.shbtn{width:100%;background:#F7F8FA;border:1.5px solid var(--line);border-radius:14px;padding:12px;color:var(--sub);font-size:14px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;font-weight:600}

/* EMPTY */
.empty{text-align:center;padding:44px 20px}.eico{font-size:46px;margin-bottom:12px}.etxt{font-size:14px;line-height:1.7;color:var(--sub)}

/* ── MOTIVATIONAL CARD ── */
.motiv-card{
  background:linear-gradient(135deg,#FFF0F0,#FFF6ED);
  border:1.5px solid #FFD6D6;border-radius:var(--r);
  padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(255,107,107,.08);
}
.motiv-emoji{font-size:26px;flex-shrink:0}
.motiv-msg{font-size:14px;font-weight:800;color:#1A1A2E;line-height:1.3;margin-bottom:2px}
.motiv-sub{font-size:12px;color:#6B7280;line-height:1.4;font-weight:500}

/* ── WATER TRACKER ── */
.water-block{background:#FFFFFF;border:none;border-radius:var(--r);padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.water-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.water-title{font-size:13px;font-weight:800;color:var(--bright)}
.water-count{font-size:14px;font-weight:800;color:#5DADE2}
.water-glasses{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.wglass{font-size:24px;cursor:pointer;transition:transform .2s;filter:grayscale(1);opacity:.25;-webkit-user-select:none;user-select:none}
.wglass.filled{filter:none;opacity:1;transform:scale(1.1)}
.water-btns{display:flex;gap:8px}
.w-add{flex:1;background:#5DADE2;border:none;border-radius:10px;padding:9px;color:#FFF;font-size:13px;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif}
.w-rem{background:#F7F8FA;border:1.5px solid var(--line);border-radius:10px;padding:9px 14px;color:var(--sub);font-size:13px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;font-weight:600}
.water-tip{font-size:11px;color:var(--muted);margin-top:6px;text-align:center;font-weight:500}

/* ── WEEKLY HEATMAP ── */
.week-section{background:#FFFFFF;border:none;border-radius:var(--r);padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.week-title{font-size:13px;font-weight:800;color:var(--bright);margin-bottom:10px}
.week-grid-wrap{overflow-x:auto}
.week-table{width:100%;border-collapse:separate;border-spacing:4px}
.week-table th{font-size:10px;color:var(--muted);text-align:center;padding:2px;font-weight:600;letter-spacing:.5px}
.week-table td{width:36px;height:36px;border-radius:8px;text-align:center;vertical-align:middle;font-size:10px;font-weight:700;cursor:default;transition:transform .15s}
.week-table td:hover{transform:scale(1.1)}
.wc-none{background:#F3F4F6;color:#D1D5DB}
.wc-low{background:#FEE2E2;color:#EF4444}
.wc-mid{background:#FEF3C7;color:#D97706}
.wc-good{background:#D1FAE5;color:#059669}
.wc-full{background:#6EE7B7;color:#065F46;font-weight:800}
.week-legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.wleg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.wleg-dot{width:10px;height:10px;border-radius:3px}

/* ── BODY METRICS ── */
.body-hero{background:linear-gradient(135deg,#F0FBF8,#FFFBEB);border:1.5px solid #A8E6D8;border-radius:var(--r);padding:18px;margin-bottom:16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.body-hero-title{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Georgia,serif;font-size:20px;color:var(--bright);margin-bottom:4px}
.body-hero-sub{font-size:12px;color:var(--sub);margin-bottom:16px}
.body-stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.bstat{background:rgba(255,255,255,.04);border-radius:10px;padding:12px 8px;text-align:center}
.bstat-val{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Georgia,serif;font-size:20px}
.bstat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

.body-form{background:#FFFFFF;border:none;border-radius:var(--r);padding:16px 18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.body-form-title{font-size:14px;font-weight:700;color:var(--bright);margin-bottom:14px}
.body-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.body-inp-wrap{display:flex;flex-direction:column;gap:5px}
.body-inp-label{font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.body-inp{background:#F7F8FA;border:1.5px solid var(--line);border-radius:10px;padding:10px 14px;color:var(--bright);font-size:15px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;width:100%;font-weight:600}
.body-inp:focus{outline:none;border-color:var(--prot);background:#FFF}
.body-save{width:100%;background:#FF6B6B;border:none;border-radius:12px;padding:13px;color:#FFF;font-size:14px;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;box-shadow:0 4px 14px rgba(255,107,107,.25)}

.body-history{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.body-hist-head{padding:11px 16px;background:var(--raised);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.body-hist-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px}
.body-hist-row:last-child{border-bottom:none}
.bhr-date{color:var(--sub)}
.bhr-vals{display:flex;gap:14px}
.bhr-v{text-align:center}
.bhr-vv{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',Georgia,serif;font-size:15px;color:var(--bright)}
.bhr-vl{font-size:10px;color:var(--muted)}

/* mini line chart */
.body-chart{height:80px;position:relative;margin:12px 0 4px}
.body-chart svg{width:100%;height:100%}

/* INSTALL */
.ibar{display:none;background:linear-gradient(90deg,var(--ink3),var(--raised));border-bottom:1px solid var(--line);padding:11px 16px;align-items:center;gap:10px;flex-shrink:0}
.itxt{flex:1;font-size:13px;font-weight:600;color:var(--body)}.isub{font-size:10px;color:var(--muted);margin-top:1px}
.igo{background:var(--mint);border:none;border-radius:8px;padding:6px 13px;font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;white-space:nowrap}
.ix{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px}

/* XP flash */
@keyframes xpPop{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-40px) scale(1.3);opacity:0}}
.xp-pop{position:fixed;pointer-events:none;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;font-size:22px;color:#FF6B6B;font-weight:900;z-index:500;animation:xpPop .9s ease-out forwards}

@media print{.bnav,.pbtn,.shbtn,.ibar{display:none!important}body{background:#fff!important;color:#000!important}.page{display:block!important;overflow:visible!important;position:static!important}.pages,.app{overflow:visible!important;height:auto!important}}
</style>

      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      body:body?JSON.stringify(body):undefined
    });
    if(!r.ok){
      const errTxt=await r.text().catch(()=>'');
      console.warn('SB ERROR',method,r.status,path,errTxt);
      // Mostrar error visible en pantalla para diagnóstico
      if(method==='GET'&&r.status!==406){
        const dbg=document.getElementById('sb-debug');
        if(dbg){dbg.textContent='Error '+r.status+': '+path.split('?')[0];dbg.style.display='block';}
      }
      return null;
    }
    const txt=await r.text();
    return txt?JSON.parse(txt):null;
  }catch(e){
    console.warn('sbFetch catch:',e);
    const dbg=document.getElementById('sb-debug');
    if(dbg){dbg.textContent='Error: '+e.message;dbg.style.display='block';}
    return null;
  }
}

// ── PRELOAD — carga desde Supabase, localStorage como respaldo ──
async function preloadData(){
  try{
    const [daysRes,supsRes,waterRes,gameRes,bodyRes]=await Promise.all([
      sbFetch(`/rest/v1/nl_days?user_key=eq.${SB_USER}&select=date,meals&order=date.desc`),
      sbFetch(`/rest/v1/nl_sups?user_key=eq.${SB_USER}&select=date,data`),
      sbFetch(`/rest/v1/nl_water?user_key=eq.${SB_USER}&select=date,glasses`),
      sbFetch(`/rest/v1/nl_game?user_key=eq.${SB_USER}&select=*`),
      sbFetch(`/rest/v1/nl_body?user_key=eq.${SB_USER}&select=*&order=date.asc`),
    ]);
    if(daysRes&&daysRes.length>=0){
      CACHE.allDates=daysRes.map(r=>r.date);
      daysRes.forEach(r=>{
        CACHE.days[r.date]={meals:r.meals||EMPTY_DAY().meals};
        LS.s('day_'+r.date,CACHE.days[r.date]);
      });
    }
    if(supsRes){supsRes.forEach(r=>{CACHE.sups[r.date]=r.data||{};LS.s('sups_'+r.date,r.data)})}
    if(waterRes){waterRes.forEach(r=>{CACHE.water[r.date]=r.glasses||0;LS.s('water_'+r.date,r.glasses)})}
    if(gameRes&&gameRes[0]){
      const g=gameRes[0];
      CACHE.game={xp:g.xp||0,unlockedAchs:g.unlocked_achs||[],lastDate:g.last_date,...(g.extra||{})};
      LS.s('game',CACHE.game);
    }
    if(bodyRes){CACHE.body=bodyRes;LS.s('body',bodyRes)}
  }catch(e){
    console.warn('Supabase no disponible, usando localStorage:',e);
  }
  // Si Supabase no respondió, cargar desde localStorage
  if(!CACHE.allDates){
    const a=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith('nl_day_')){
        const date=k.replace('nl_day_','');
        const data=LS.g('day_'+date);
        if(data){CACHE.days[date]=data;a.push(date);}
      }
    }
    CACHE.allDates=a.sort().reverse();
    if(!CACHE.game){const g=LS.g('game');if(g)CACHE.game=g}
    if(!CACHE.body){const b=LS.g('body');if(b)CACHE.body=b}
  }
}

// ══════════════════════════════════════════
//  GAME ENGINE
// ══════════════════════════════════════════
function getLevel(xp){
  for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].min)return LEVELS[i]}
  return LEVELS[0];
}
function getStreak(){
  const dates=dbAllSync();if(!dates.length)return 0;
  let streak=0;
  const today=TODAY();
  let d=new Date(today+'T12:00:00');
  for(let i=0;i<60;i++){
    const ds=d.toISOString().split('T')[0];
    const data=dbDaySync(ds);
    const hasFood=Object.values(data.meals).some(e=>e.length>0);
    if(hasFood){streak++}else if(ds!==today){break}
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function getStats(){
  const dates=dbAllSync();
  let totalEntries=0,proteinGoalDays=0,allSupsDays=0,fullPortionDays=0,prowheyDays=[];
  dates.forEach(date=>{
    const data=dbDaySync(date);
    let p=0;
    MEALS.forEach(m=>(data.meals[m.id]||[]).forEach(e=>{p+=e.p||0;totalEntries++}));
    if(p>=GOALS.p*.9)proteinGoalDays++;
    const sups=dbSupsSync(date);
    if(SUPS.every(s=>sups[s.id]))allSupsDays++;
    if(sups['prowhey'])prowheyDays.push(date);
    let allFull=true;
    MEALS.forEach(m=>{
      const entries=data.meals[m.id]||[];
      m.porciones.forEach(por=>{
        const cnt=entries.filter(e=>FOODS.find(f=>f.n===e.n&&f.grupo===por.grupo)).length;
        if(cnt<por.meta)allFull=false;
      });
    });
    if(allFull&&Object.values(data.meals).some(e=>e.length>0))fullPortionDays++;
  });
  let prowheyStreak=0;
  const today=TODAY();let d=new Date(today+'T12:00:00');
  for(let i=0;i<60;i++){
    const ds=d.toISOString().split('T')[0];
    if(prowheyDays.includes(ds)){prowheyStreak++}else if(ds!==today){break}
    d.setDate(d.getDate()-1);
  }
  const streak=getStreak();
  const gp=dbGameSync();
  const lvl=getLevel(gp.xp);
  return{totalEntries,proteinGoalDays,allSupsDays,fullPortionDays,prowheyStreak,streak,xp:gp.xp,level:lvl.lvl};
}

async function awardXP(amount,label,x,y){
  const gp=dbGameSync();
  const oldLvl=getLevel(gp.xp).lvl;
  gp.xp+=amount;
  await dbSaveGame(gp);
  const newLvl=getLevel(gp.xp).lvl;
  const pop=document.createElement('div');
  pop.className='xp-pop';
  pop.textContent='+'+amount+' XP';
  pop.style.left=(x||window.innerWidth/2-30)+'px';
  pop.style.top=(y||window.innerHeight/2)+'px';
  document.body.appendChild(pop);
  setTimeout(()=>pop.remove(),1000);
  updateHdrGame();
  if(newLvl>oldLvl){
    const lvlData=getLevel(gp.xp);
    setTimeout(()=>celebrate('🎊','¡Subiste de nivel!',`Ahora eres: ${lvlData.name}`,0),500);
  }
  checkAchievements();
}

async function checkAchievements(){
  const stats=getStats();
  const gp=dbGameSync();
  for(const ach of ACHIEVEMENTS){
    if(!gp.unlockedAchs.includes(ach.id)&&ach.check(stats)){
      gp.unlockedAchs.push(ach.id);
      if(ach.xp>0)gp.xp+=ach.xp;
      await dbSaveGame(gp);
      updateHdrGame();
      setTimeout(()=>celebrate(ach.ico,'¡Logro desbloqueado!',ach.name+'\n'+ach.desc,ach.xp),300);
    }
  }
}

function launchConfetti(){
  const cv=document.getElementById('confetti-canvas');
  cv.style.display='block';
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const colors=['#64E0A0','#FFB347','#C084FC','#60C4FF','#FF6B6B','#FFD700'];
  const pieces=Array.from({length:80},()=>({
    x:Math.random()*cv.width,y:-10,
    vx:(Math.random()-0.5)*4,vy:Math.random()*3+2,
    color:colors[Math.floor(Math.random()*colors.length)],
    size:Math.random()*8+4,rot:Math.random()*360,rotv:(Math.random()-0.5)*8,
    shape:Math.random()>.5?'rect':'circle'
  }));
  function frame(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pieces.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotv;p.vy+=0.05;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill()}
      else{ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2)}
      ctx.restore();
    });
    if(pieces.some(p=>p.y<cv.height+20))confettiAnim=requestAnimationFrame(frame);
    else{cv.style.display='none'}
  }
  confettiAnim=requestAnimationFrame(frame);
}

// ── Helper: macros totales del día incluyendo Prowhey de suplementos ──
const PROWHEY_MACROS = {p:35, k:194, c:8, f:2};
function dayTotals(date){
  const data = dbDaySync(date);
  const sups = dbSupsSync(date);
  const pw = sups['prowhey'] ? PROWHEY_MACROS : {p:0,k:0,c:0,f:0};
  let tot = {p:pw.p, k:pw.k, c:pw.c, f:pw.f};
  MEALS.forEach(m=>(data.meals[m.id]||[]).forEach(e=>{
    tot.p+=e.p||0; tot.k+=e.k||0; tot.c+=e.c||0; tot.f+=e.f||0;
  }));
  return tot;
}

function renderT(){
  const data=dbDaySync(TODAY());
  const sups=dbSupsSync(TODAY());
  let tot=dayTotals(TODAY()),h='';
  // recalcular sin meals para no duplicar — el helper ya incluye meals
  // revertir tot a solo prowhey y recalcular
  const pw=sups['prowhey']?PROWHEY_MACROS:{p:0,k:0,c:0,f:0};
  tot={p:pw.p,k:pw.k,c:pw.c,f:pw.f};

  MEALS.forEach(m=>{
    const entries=data.meals[m.id]||[];
    entries.forEach(x=>{tot.p+=x.p||0;tot.k+=x.k||0;tot.c+=x.c||0;tot.f+=x.f||0});
    const has=entries.length>0;

    // calc portions — busca primero por grupo guardado, luego por nombre en FOODS
    const portionStatus=m.porciones.map(por=>{
      const cnt=entries.filter(e=>{
        // Si la entrada tiene grupo guardado, usarlo directamente
        if(e.grupo)return e.grupo===por.grupo;
        // Fallback: buscar en FOODS por nombre
        const f=FOODS.find(fd=>fd.n===e.n);
        return f&&f.grupo===por.grupo;
      }).length;
      return{...por,cnt:Math.min(cnt,por.meta)};
    });
    const allComplete=portionStatus.every(p=>p.cnt>=p.meta);

function doS(){
  const q=document.getElementById('sin').value.toLowerCase().trim();
  const el=document.getElementById('res');
  if(!q){
    const cats=[...new Set(FOODS.map(f=>f.cat))];
    el.innerHTML='<div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:1.5px;text-transform:uppercase">Categorías</div>'+
      cats.map(c=>`<div class="ritem" onclick="showCat('${c.replace(/'/g,"&#39;")}')">
        <div class="rn">${c}</div><div class="rs">${FOODS.filter(f=>f.cat===c).length} alimentos</div>
      </div>`).join('');
    return;
  }
  if(q.length<2){el.innerHTML='';return}
  const res=FOODS.filter(f=>f.n.toLowerCase().includes(q)||(f.cat&&f.cat.toLowerCase().includes(q))).slice(0,12);
  if(!res.length){el.innerHTML='<div style="font-size:12px;color:var(--muted);padding:8px">No encontrado — usa ingreso manual</div>';return}
  el.innerHTML=res.map(f=>`
    <div class="ritem" onclick='addFS(${JSON.stringify(f).replace(/'/g,"&#39;")})'>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:6px">
        <div class="rn">${f.n}</div><span class="rcat">${f.cat.replace(/^.+? /,'')}</span>
      </div>
      <div class="rs">${f.u} · 💪${f.p}g · 🔥${f.k}kcal · 🌾${f.c}g · 🥑${f.f}g</div>

}
function showCat(cat){

  document.getElementById('sin').value=cat.replace(/^.+? /,'');

    <span>${cat}</span><span style="cursor:pointer;color:var(--mint)" onclick="document.getElementById('sin').value='';doS()">← Categorías</span>
  </div>`+
  FOODS.filter(f=>f.cat===cat).map(f=>`
    <div class="ritem" onclick='addFS(${JSON.stringify(f).replace(/'/g,"&#39;")})'>
      <div class="rn">${f.n}</div>
      <div class="rs">${f.u} · 💪${f.p}g · 🔥${f.k}kcal · 🌾${f.c}g · 🥑${f.f}g</div>

function addFS(f){addEntry({n:f.n,p:f.p,k:f.k,c:f.c,f:f.f,u:f.u,grupo:f.grupo})}
function addM(){
  const name=document.getElementById('mn').value.trim();
  if(!name){alert('Escribe el nombre');return}
  const p=parseFloat(document.getElementById('mp').value)||0;
  const c=parseFloat(document.getElementById('mc').value)||0;
  const ff=parseFloat(document.getElementById('mf').value)||0;
  let k=parseFloat(document.getElementById('mk').value)||0;
  if(!k)k=Math.round(p*4+c*4+ff*9);
  addEntry({n:name,p,k,c,f:ff,u:'manual',grupo:'mixto'});
}
async function addEntry(entry){
  if(!curMeal)return;
  const data=dbDaySync(TODAY());
  if(!data.meals[curMeal])data.meals[curMeal]=[];
  const wasEmpty=data.meals[curMeal].length===0;
  data.meals[curMeal].push(entry);
  await dbSaveDay(TODAY(),data);
  closeM();
  const baseXP=entry.grupo==='proteina'?12:entry.grupo==='verdura'?10:entry.grupo==='fruta'?8:5;
  awardXP(baseXP,'alimento registrado');
  if(wasEmpty&&curMeal==='breakfast')checkAchievements();
  const meal=MEALS.find(m=>m.id===curMeal);
  const entries=data.meals[curMeal];
  const allComplete=meal.porciones.every(por=>{
    const cnt=entries.filter(e=>{
      if(e.grupo)return e.grupo===por.grupo;
      const f=FOODS.find(fd=>fd.n===e.n);
      return f&&f.grupo===por.grupo;
    }).length;
    return cnt>=por.meta;
  });
  if(allComplete&&entries.length===meal.porciones.reduce((a,p)=>a+p.meta,0)){
    setTimeout(()=>celebrate('🎯','¡'+meal.icon+' '+meal.name+' completo!','Todas las porciones recomendadas cubierta — ¡perfecto!',25),300);
    checkAchievements();
  }
  checkDayComplete(data);
  renderT();
}
async function checkDayComplete(data){
  let dayComplete=true;
  MEALS.forEach(m=>{
    const entries=data.meals[m.id]||[];
    m.porciones.forEach(por=>{
      const cnt=entries.filter(e=>{
        if(e.grupo)return e.grupo===por.grupo;
        const f=FOODS.find(fd=>fd.n===e.n);
        return f&&f.grupo===por.grupo;
      }).length;
      if(cnt<por.meta)dayComplete=false;
    });
  });
  if(dayComplete){
    const gd=dbGameSync();
    if(!gd['dayComplete_'+TODAY()]){
      gd['dayComplete_'+TODAY()]=true;
      await dbSaveGame(gd);
      setTimeout(()=>celebrate('🌟','¡Día completo!','¡Todas las porciones del plan cubiertas hoy!\nEres una campeona 💚',50),500);
      checkAchievements();
    }
  }
}

function renderS(date){

  MEALS.forEach(m=>{const e=data.meals[m.id]||[];allE[m.id]=e;});

  const sc=Math.round(Math.min(100,tot.p/GOALS.p*100)*.45+Math.min(100,tot.k/GOALS.k*100)*.30+Math.min(100,tot.c/GOALS.c*100)*.15+Math.min(100,tot.f/GOALS.f*100)*.10);
  const cls=sc>=75?'great':sc>=50?'good':'poor';
  const fbs=[];
  if(tot.p>=GOALS.p*.9)fbs.push({c:'great',t:'✅ Meta de proteína alcanzada',m:`${tot.p}g de ${GOALS.p}g — ¡clave para combatir la sarcopenia!`});
  else if(tot.p>=GOALS.p*.7)fbs.push({c:'warn',t:'⚠️ Proteína cerca de meta',m:`${tot.p}g de ${GOALS.p}g — faltan ${GOALS.p-tot.p}g. ¿Tomaste el Prowhey?`});
  else fbs.push({c:'bad',t:'❌ Proteína insuficiente',m:`${tot.p}g de ${GOALS.p}g — déficit de ${GOALS.p-tot.p}g.`});
  if(tot.k>=GOALS.k*.85&&tot.k<=GOALS.k*1.1)fbs.push({c:'great',t:'✅ Calorías en rango',m:`${tot.k} kcal de ${GOALS.k} establecidas.`});
  else if(tot.k<GOALS.k*.7)fbs.push({c:'warn',t:'⚠️ Calorías muy bajas',m:`${tot.k} kcal — comer poco aumenta la pérdida muscular.`});
  else if(tot.k>GOALS.k*1.15)fbs.push({c:'warn',t:'⚠️ Calorías por encima',m:`${tot.k} kcal — ${tot.k-GOALS.k} kcal sobre la meta.`});
  const supDone=SUPS.filter(s=>supChecked[s.id]).length;
  if(supDone===SUPS.length)fbs.push({c:'great',t:'✅ Todos los suplementos tomados',m:'Prowhey, Vitamina D3, Omega 3, Bariatric Fusion y Creatina — ¡perfecto!'});
  else if(supChecked['prowhey'])fbs.push({c:'warn',t:'⚠️ Suplementos incompletos',m:`Prowhey ✓ · ${supDone} de ${SUPS.length} tomados.`});
  else fbs.push({c:'bad',t:'❌ Prowhey no registrado',m:'Sin el Prowhey es muy difícil llegar a los 90g de proteína.'});
  const macros=[
    {nm:'Proteína',  sub:'meta 90g',  v:tot.p,g:GOALS.p,u:'g',   col:'var(--prot)'},
    {nm:'Calorías',  sub:'meta 1650', v:tot.k,g:GOALS.k,u:'kcal',col:'var(--kcal)'},
    {nm:'Carbohid.', sub:'meta 145g', v:tot.c,g:GOALS.c,u:'g',   col:'var(--carb)'},
    {nm:'Grasas',    sub:'meta 58g',  v:tot.f,g:GOALS.f,u:'g',   col:'var(--gras)'},
  ];
  const scoreMsg=sc>=75?'✨ ¡Excelente! Plan bien cumplido.':sc>=50?'👍 Buen día, hay áreas de mejora.':'⚠️ Día difícil — mañana es otra oportunidad.';
  document.getElementById('sumC').innerHTML=`
    <div class="swrap2">
      <div class="sarc ${cls}"><div class="snum ${cls}">${sc}</div><div class="sden">/ 100</div></div>
      <div class="smsg">${scoreMsg}</div>
    </div>
    <div class="mbars">${macros.map(m=>{
  const pct=Math.min(100,Math.round(m.v/m.g*100));
  const ok=pct>=85&&pct<=115;
  const over=pct>115;
  const barColor=over?'var(--coral)':m.col;
  return`<div class="mbrow">
    <div class="mbn">${m.nm}<span class="mb-sub">${m.sub}</span></div>
    <div class="mbtrack"><div class="mbfill" style="width:${pct}%;background:${barColor}"></div></div>
    <div class="mbval-wrap">
      <span class="mbval" style="color:${barColor}">${m.v}${m.u}${ok?' ✓':over?' ▲':''}</span>
      <span class="mbpct">${pct}% de meta</span>
    </div>
  </div>`;
}).join('')}</div>
    <div class="mdet"><div class="mdh">Detalle por tiempo de comida</div>${MEALS.map(m=>{const e=allE[m.id]||[];if(!e.length)return'';const mp=e.reduce((a,x)=>a+(x.p||0),0),mk=e.reduce((a,x)=>a+(x.k||0),0);return`<div class="mdm"><div class="mdmn">${m.icon} ${m.name} — ${mp}g prot · ${mk} kcal</div><div class="mdmi">${e.map(x=>x.n).join(' · ')}</div></div>`}).join('')}</div>
    ${fbs.map(f=>`<div class="fbcard ${f.c}"><div class="fbt ${f.c}">${f.t}</div><div class="fbm">${f.m}</div></div>`).join('')}`;
}

function getMotivMsg(streak){
  let pool=MOTIV_BY_STREAK[0].msgs;
  for(let i=MOTIV_BY_STREAK.length-1;i>=0;i--){
    if(streak>=MOTIV_BY_STREAK[i].min){pool=MOTIV_BY_STREAK[i].msgs;break}
  }
  const m=pool[new Date().getHours()%pool.length];
  return{...m,t:m.t.replace('{streak}',streak)};
}

async function setWaterTo(n){
  const prev=getWater();
  await setWater(Math.max(0,Math.min(WATER_GOAL,n)));
  if(n>=WATER_GOAL&&prev<WATER_GOAL){awardXP(5,'meta de agua')}
  renderWater();
}
async function addWater(){
  const prev=getWater();
  const next=Math.min(WATER_GOAL,prev+1);
  await setWater(next);
  if(next>=WATER_GOAL&&prev<WATER_GOAL){awardXP(5,'meta de agua');setTimeout(()=>celebrate('💧','¡Meta de agua alcanzada!','8 vasos de agua hoy — tu cuerpo lo nota 💚',5),200)}
  renderWater();
}
async function removeWater(){await setWater(Math.max(0,getWater()-1));renderWater()}

function renderWeekHeatmap(){
  const today=new Date();
  const grupos=['proteina','cereal','tuberculo','fruta','verdura','grasa','lacteo'];
  const grupoLabel={'proteina':'💪Prot','cereal':'🍚Cereal','tuberculo':'🥔Tubér','fruta':'🍊Fruta','verdura':'🥦Verd','grasa':'🥑Grasa','lacteo':'🥛Lácteo'};
  // Get last 7 days
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    days.push(d.toISOString().split('T')[0]);
  }
  const dayNames=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  let thead='<tr><th></th>'+days.map(d=>{const dt=new Date(d+'T12:00:00');return`<th>${dayNames[dt.getDay()]}<br><span style="font-size:9px;opacity:.6">${dt.getDate()}</span></th>`}).join('')+'</tr>';
  let tbody='';
  grupos.forEach(grupo=>{
    let row=`<tr><td style="font-size:10px;color:var(--muted);padding-right:6px;white-space:nowrap;text-align:right">${grupoLabel[grupo]}</td>`;
    days.forEach(date=>{
      const data=dbDaySync(date);
      let cnt=0;
      MEALS.forEach(m=>{
        const por=m.porciones.find(p=>p.grupo===grupo);
        if(por){
          const entries=data.meals[m.id]||[];
          cnt+=entries.filter(e=>{
            if(e.grupo)return e.grupo===grupo;
            const f=FOODS.find(fd=>fd.n===e.n);
            return f&&f.grupo===grupo;
          }).length;
        }
      });
      const meta=MEALS.reduce((a,m)=>{const p=m.porciones.find(p=>p.grupo===grupo);return a+(p?p.meta:0)},0);
      let cls='wc-none',txt='';
      if(meta>0){
        const ratio=cnt/meta;
        if(ratio===0)cls='wc-none';
        else if(ratio<0.5)cls='wc-low';
        else if(ratio<1)cls='wc-mid';
        else if(ratio===1)cls='wc-good';
        else cls='wc-full';
        txt=cnt>0?cnt:'';
      } else {cls='wc-none';txt='—'}
      row+=`<td class="${cls}" title="${grupoLabel[grupo]} · ${date}">${txt}</td>`;
    });
    row+='</tr>';
    tbody+=row;
  });

  document.getElementById('weekHeatmap').innerHTML=`
    <div class="week-section">
      <div class="week-title">📅 Porciones esta semana</div>
      <div class="week-grid-wrap">
        <table class="week-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>
      </div>
      <div class="week-legend">
        <div class="wleg"><div class="wleg-dot" style="background:rgba(255,107,107,.3)"></div>Poco</div>
        <div class="wleg"><div class="wleg-dot" style="background:rgba(255,179,71,.3)"></div>Medio</div>
        <div class="wleg"><div class="wleg-dot" style="background:rgba(100,224,160,.3)"></div>Meta</div>
        <div class="wleg"><div class="wleg-dot" style="background:rgba(100,224,160,.5)"></div>Excedido</div>
      </div>
    </div>`;
}

async function clearToday(){
  const dn=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const mn=['enero','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const now=new Date(new Date().getTime()-5*60*60*1000);
  const dayName=dn[now.getDay()]+' '+now.getDate()+' de '+mn[now.getMonth()];
  if(!confirm('¿Borrar TODO el registro de hoy (' + dayName + ')? Se eliminarán comidas, suplementos y agua. No se puede deshacer.'))return;
  const today=TODAY();
  const emptyDay={meals:{breakfast:[],morning:[],lunch:[],afternoon:[],dinner:[]}};
  // 1. Limpiar cache en memoria
  CACHE.days[today]=emptyDay;
  CACHE.sups[today]={};
  CACHE.water[today]=0;
  if(CACHE.allDates){
    CACHE.allDates=CACHE.allDates.filter(d=>d!==today);
  }
  // 2. Limpiar localStorage completamente para hoy
  try{
    LS.del('day_'+today);
    LS.del('sups_'+today);
    LS.del('water_'+today);
  }catch(e){}
  // 3. Limpiar Supabase
  try{
    await sbFetch('/rest/v1/nl_days?user_key=eq.'+SB_USER+'&date=eq.'+today,'DELETE');
    await sbFetch('/rest/v1/nl_sups?user_key=eq.'+SB_USER+'&date=eq.'+today,'DELETE');
    await sbFetch('/rest/v1/nl_water?user_key=eq.'+SB_USER+'&date=eq.'+today,'DELETE');
  }catch(e){console.warn('SB clear error:',e);}
  // 4. Re-renderizar todo
  renderMotiv();
  renderWater();
  renderWeekHeatmap();
  try{renderT();}catch(e){console.error('renderT error:',e);document.getElementById('todayMeals').innerHTML='<div style="background:#FEE2E2;padding:12px;border-radius:10px;font-size:12px;font-weight:600;color:#991B1B;margin:8px 0">Error: '+e.message+'</div>';}
  try{renderSups();}catch(e){console.error('renderSups:',e)}
  renderS(today);
}

// ══════════════════════════════════════════
//  EXPORTAR / IMPORTAR DATOS
// ══════════════════════════════════════════
function exportData(){
  const data={version:1,exported:new Date().toISOString(),days:{},sups:{},water:{},game:null,body:[]};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k||!k.startsWith('nl_'))continue;
    try{
      const v=JSON.parse(localStorage.getItem(k));
      const key=k.replace('nl_','');
      if(key.startsWith('day_'))data.days[key.replace('day_','')]=v;
      else if(key.startsWith('sups_'))data.sups[key.replace('sups_','')]=v;
      else if(key.startsWith('water_'))data.water[key.replace('water_','')]=v;
      else if(key==='game')data.game=v;
      else if(key==='body')data.body=v;
    }catch(e){}
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='nutrilog_backup_'+TODAY()+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version){alert('Archivo inválido');return}
      // Restaurar days
      Object.entries(data.days||{}).forEach(([date,v])=>{
        localStorage.setItem('nl_day_'+date,JSON.stringify(v));
        CACHE.days[date]=v;
      });
      // Restaurar sups
      Object.entries(data.sups||{}).forEach(([date,v])=>{
        localStorage.setItem('nl_sups_'+date,JSON.stringify(v));
        CACHE.sups[date]=v;
      });
      // Restaurar water
      Object.entries(data.water||{}).forEach(([date,v])=>{
        localStorage.setItem('nl_water_'+date,JSON.stringify(v));
        CACHE.water[date]=v;
      });
      // Restaurar game
      if(data.game){localStorage.setItem('nl_game',JSON.stringify(data.game));CACHE.game=data.game}
      // Restaurar body
      if(data.body){localStorage.setItem('nl_body',JSON.stringify(data.body));CACHE.body=data.body}
      // Reconstruir allDates
      CACHE.allDates=Object.keys(data.days).filter(d=>Object.values(data.days[d].meals||{}).some(e=>e.length>0)).sort().reverse();
      alert('✅ Datos restaurados correctamente');
      location.reload();
    }catch(err){alert('Error al importar: '+err.message)}
  };
  reader.readAsText(file);
}
