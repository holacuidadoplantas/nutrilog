<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriLog">
<meta name="theme-color" content="#0A0A14">
<title>NutriLog · Paola</title>
<style>
:root {
  /* ── Fondos ── */
  --bg:    #F8F9FB;
  --bg2:   #FFFFFF;
  --bg3:   #EEF0F5;
  --card:  #FFFFFF;
  --raise: #F4F5F8;
  --line:  #E4E7EF;
  --line2: #C9CDD9;

  /* ── Texto (escala slate) ── */
  --muted:  #94A0B8;
  --sub:    #596280;
  --body:   #2E3550;
  --bright: #111827;

  /* ── Macros: cada uno con su identidad ── */
  --prot:  #0F766E;   /* teal  — proteína */
  --kcal:  #C2410C;   /* naranja oscuro — calorías */
  --carb:  #6D28D9;   /* índigo — carbohidratos */
  --fat:   #1E63B0;   /* azul  — grasas */

  /* ── Semánticos ── */
  --success: #0D9488;  /* teal claro — logros/metas */
  --warn:    #B45309;  /* ámbar — advertencia */
  --danger:  #C53030;  /* rojo sobrio — error */
  --gold:    #A16207;  /* dorado — logros/XP */

  /* ── Aliases para compatibilidad ── */
  --mint:   var(--success);
  --amber:  var(--warn);
  --coral:  var(--danger);
  --sky:    var(--fat);
  --lilac:  var(--carb);

  --r: 14px;
  --rs: 10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--body);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;overflow:hidden;font-size:16px;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100dvh;height:100vh;max-width:430px;margin:0 auto;overflow:hidden}

/* ── HEADER ── */
.hdr{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--line);padding:10px 16px 12px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{font-size:20px;font-weight:800;color:var(--bright);letter-spacing:-.5px}
.logo span{color:var(--prot)}
.badges{display:flex;gap:8px;align-items:center}
.badge{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:700}
.badge-streak{background:#FFF7ED;border:1px solid #F59E0B;color:#92400E}
.badge-xp{background:#F5F0FF;border:1px solid #8B5CF6;color:#4C1D95}
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.macro{background:var(--bg3);border:1px solid var(--line);border-radius:var(--rs);padding:8px 10px}
.macro-lbl{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.macro-val-row{display:flex;align-items:baseline;gap:2px}
.macro-val{font-size:17px;font-weight:900;line-height:1}
.macro-meta{font-size:10px;color:var(--muted);font-weight:500}
.macro-bar{height:5px;background:var(--line);border-radius:3px;margin-top:6px;overflow:hidden}
.macro-fill{height:100%;border-radius:3px;transition:width .4s}
.mv-p{color:var(--prot)} .mf-p{background:var(--prot)}
.mv-k{color:var(--kcal)} .mf-k{background:var(--kcal)}
.mv-c{color:var(--carb)} .mf-c{background:var(--carb)}
.mv-f{color:var(--fat)}  .mf-f{background:var(--fat)}

/* ── PAGES ── */
.pages{flex:1;overflow:hidden;position:relative;min-height:0}
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 88px;display:none}
.page.on{display:block}

/* ── BOTTOM NAV ── */
.nav{flex-shrink:0;display:flex;background:var(--bg2);border-top:1px solid var(--line);padding:6px 0 max(6px,env(safe-area-inset-bottom));box-shadow:0 -1px 6px rgba(0,0,0,.06)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;border:none;background:none;color:var(--muted);cursor:pointer;transition:color .15s}
.nb.on{color:var(--prot)}
.nb-ico{font-size:20px;line-height:1}
.nb-lbl{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}

/* ── CARDS & SECTIONS ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-head{background:var(--raise);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--sub)}
.section-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.section-lbl::after{content:'';flex:1;height:1px;background:var(--line)}

/* ── MOTIV CARD ── */
.motiv{display:flex;align-items:center;gap:12px;background:#F8FFFE;border:1px solid #CCEBE8;border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
.motiv-ico{font-size:26px;flex-shrink:0}
.motiv-txt{font-size:13px;font-weight:700;color:var(--bright);line-height:1.3}
.motiv-sub{font-size:11px;color:var(--sub);margin-top:2px}

/* ── WATER ── */
.water{background:var(--card);border:1px solid #BAD0E8;border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
.water-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.water-lbl{font-size:12px;font-weight:700;color:var(--fat)}
.water-val{font-size:12px;color:var(--muted)}
.water-cups{display:flex;gap:5px;flex-wrap:wrap}
.wcup{font-size:18px;cursor:pointer;opacity:.2;transition:opacity .15s;line-height:1}
.wcup.on{opacity:1}

/* ── WEEK HEATMAP ── */
.heatmap{display:flex;gap:5px;margin-bottom:12px;align-items:flex-end}
.hcell{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.hbar{width:100%;min-height:3px;border-radius:3px;transition:height .3s}
.hlbl{font-size:9px;color:var(--muted)}

/* ── MEAL BLOCK ── */
.mblock{margin-bottom:10px}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.mpill{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;color:var(--sub)}
.mpill .dot{width:6px;height:6px;border-radius:50%;background:var(--line2);transition:all .2s}
.mpill.has .dot{background:var(--prot);box-shadow:0 0 5px rgba(15,118,110,.4)}
.mtime{font-size:11px;color:var(--muted)}
.mcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.chips{display:flex;gap:4px;flex-wrap:wrap;padding:8px 12px;border-bottom:1px solid var(--line)}
.chip{font-size:10px;font-weight:700;padding:3px 7px;border-radius:20px;border:1.5px solid var(--line2);color:var(--muted)}
.chip.done{border-color:var(--prot);color:var(--prot)}
.chip.part{border-color:var(--warn);color:var(--warn)}
.erow{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);gap:8px}
.erow:last-child{border-bottom:none}
.ename{flex:1;font-size:13px;color:var(--bright);line-height:1.3}
.ecat{font-size:10px;color:var(--muted);margin-top:1px}
.etags{display:flex;gap:3px;flex-shrink:0}
.tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px}
.tp{background:rgba(15,118,110,.1);color:var(--prot)}
.tk{background:rgba(194,65,12,.1);color:var(--kcal)}
.tc{background:rgba(109,40,217,.1);color:var(--carb)}
.tf{background:rgba(30,99,176,.1);color:var(--fat)}
.xbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 5px;line-height:1}
.emeal{padding:12px;font-size:12px;color:var(--muted);font-style:italic}
.mtots{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tchip{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--bg3);border:1px solid var(--line);color:var(--sub)}
.abtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:#F0FDFC;border:1.5px dashed #5EADA8;border-radius:var(--r);padding:10px;color:var(--prot);font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit}
.drink-tip{margin-top:6px;padding:8px 12px;background:rgba(91,200,255,.07);border:1px solid rgba(91,200,255,.18);border-radius:8px;font-size:12px;color:var(--sky)}

/* ── SUPPLEMENTS ── */
.sup-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line);gap:12px;cursor:pointer;-webkit-user-select:none;user-select:none}
.sup-row:last-child{border-bottom:none}
.sup-row.done{background:rgba(95,224,160,.03)}
.sup-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:transparent;transition:all .2s}
.sup-row.done .sup-check{background:var(--prot);border-color:var(--prot);color:#fff}
.sup-name{font-size:14px;font-weight:600;color:var(--bright)}
.sup-row.done .sup-name{color:var(--prot)}
.sup-meta{font-size:11px;color:var(--muted);margin-top:1px}
.sup-dose{font-size:11px;color:var(--warn);font-weight:600}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.overlay.on{display:flex}
.sheet{background:var(--bg2);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:6px 16px 32px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 30px rgba(0,0,0,.12)}
.handle{width:36px;height:4px;border-radius:2px;background:var(--line2);margin:0 auto 14px}
.sheet-title{font-size:17px;font-weight:800;color:var(--bright);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.cbtn{background:var(--raise);border:1px solid var(--line);color:var(--sub);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.sinput{flex:1;background:var(--bg3);border:1px solid var(--line2);border-radius:10px;padding:10px 12px;color:var(--bright);font-size:14px;font-family:inherit;outline:none}
.sinput:focus{border-color:var(--prot)}
.sinput::placeholder{color:var(--muted)}
.sbtn{background:var(--prot);border:none;border-radius:10px;padding:10px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.results{max-height:200px;overflow-y:auto;margin-bottom:12px}
.ritem{padding:10px 12px;background:var(--bg3);border-radius:10px;margin-bottom:5px;cursor:pointer;border:1px solid var(--line)}
.ritem:active{border-color:var(--prot);background:#F0FDFC}
.rname{font-size:13px;font-weight:700;color:var(--bright);line-height:1.3}
.rmeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;align-items:center}
.rmeta-u{font-size:10px;color:var(--muted);flex:1;min-width:100%}
.rmacro{font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.2px}
.rmacro-p{background:rgba(15,118,110,.1);color:var(--prot)}
.rmacro-k{background:rgba(194,65,12,.1);color:var(--kcal)}
.rmacro-c{background:rgba(109,40,217,.1);color:var(--carb)}
.rmacro-f{background:rgba(30,99,176,.1);color:var(--fat)}
.rcat{font-size:9px;color:var(--muted);background:var(--line);padding:2px 6px;border-radius:4px;font-weight:600}
.divider{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin:10px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
.flbl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);margin-bottom:4px;display:block}
.finput{width:100%;background:var(--bg3);border:1px solid var(--line2);border-radius:10px;padding:10px 12px;color:var(--bright);font-size:14px;font-family:inherit;outline:none;margin-bottom:8px}
.finput:focus{border-color:var(--prot)}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.save-btn{width:100%;background:var(--prot);border:none;border-radius:12px;padding:13px;color:var(--bg);font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:4px}

/* ── SUMMARY ── */
.nav-dates{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.narr{background:var(--raise);border:1px solid var(--line);color:var(--sub);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.date-lbl{font-size:16px;font-weight:800;color:var(--bright)}
.score-ring{display:flex;flex-direction:column;align-items:center;margin-bottom:16px}
.ring{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid var(--line);margin-bottom:8px}
.ring.great{border-color:var(--prot);background:#F0FDFC}
.ring.ok{border-color:var(--amber);background:#FAF5EC}
.ring.poor{border-color:var(--coral);background:#FAF0F0}
.score-num{font-size:38px;font-weight:900;line-height:1}
.score-num.great{color:var(--prot)}
.score-num.ok{color:var(--warn)}
.score-num.poor{color:var(--danger)}
.score-den{font-size:11px;color:var(--muted)}
.score-msg{font-size:13px;color:var(--sub);text-align:center}
.mbar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.mbar-row:last-child{margin-bottom:0}
.mbar-lbl{font-size:12px;color:var(--sub);width:72px;flex-shrink:0}
.mbar-track{flex:1;height:7px;background:var(--line);border-radius:4px;overflow:hidden}
.mbar-fill{height:100%;border-radius:4px;transition:width .5s}
.mbar-val{font-size:12px;font-weight:700;width:60px;text-align:right;flex-shrink:0}
.fbcard{border-radius:var(--rs);padding:11px 14px;margin-bottom:8px}
.fbcard.great{background:#F0FDFC;border:1px solid #99D4D0}
.fbcard.warn{background:#FFFBEB;border:1px solid #F0C060}
.fbcard.bad{background:#FFF5F5;border:1px solid #E08080}
.fbt{font-size:13px;font-weight:700;margin-bottom:3px}
.fbt.great{color:var(--prot)}.fbt.warn{color:var(--warn)}.fbt.bad{color:var(--danger)}
.fbm{font-size:12px;color:var(--sub);line-height:1.5}

/* ── HISTORY ── */
.filters{display:flex;gap:6px;margin-bottom:14px}
.fil{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:var(--bg3);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer}
.fil.on{background:var(--prot);border-color:var(--prot);color:#fff}
.chart-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px}
.chart-lbl{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:56px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bbar{width:100%;border-radius:3px 3px 0 0;min-height:2px}
.bdate{font-size:8px;color:var(--muted)}
.hday{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.hday-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.hscore{width:46px;height:46px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;line-height:1}
.hscore-sub{font-size:8px;font-weight:600;opacity:.7}
.hdinfo{flex:1}
.hddate{font-size:14px;font-weight:800;color:var(--bright)}
.hdmacros{font-size:11px;color:var(--sub);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.hdmacro{font-weight:600}
.hdbars{display:flex;gap:3px;margin-top:6px}
.hb{height:4px;flex:1;border-radius:2px;background:var(--line);overflow:hidden}
.hbf{height:100%;border-radius:2px}
.hd-meals{border-top:1px solid var(--line);padding-top:8px}
.hd-meal-row{display:flex;gap:6px;padding:4px 0;border-bottom:1px dashed var(--line);font-size:11px}
.hd-meal-row:last-child{border-bottom:none}
.hd-meal-name{font-weight:700;color:var(--sub);flex-shrink:0;width:80px}
.hd-meal-foods{color:var(--body);flex:1;line-height:1.4}
.hd-meal-prot{font-weight:700;flex-shrink:0;font-size:10px}
.hd-sups{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}
.hd-sup{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.hd-sup.ok{background:#F0FDFC;color:var(--prot)}
.hd-sup.miss{background:var(--bg3);color:var(--muted);opacity:.6}

/* ── ACHIEVEMENTS ── */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ach{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px;text-align:center;position:relative;overflow:hidden}
.ach.done{border-color:#D97706;box-shadow:0 0 0 1px #D97706}
.ach.locked{opacity:.35;filter:grayscale(.7)}
.ach-ico{font-size:28px;margin-bottom:5px}
.ach-name{font-size:11px;font-weight:800;color:var(--bright);margin-bottom:2px}
.ach-desc{font-size:10px;color:var(--sub);line-height:1.4}
.ach-xp{position:absolute;top:6px;right:7px;font-size:10px;font-weight:700;color:#92400E}

/* ── REPORT ── */
.rep-top{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
.rep-name{font-size:20px;font-weight:900;color:var(--bright);margin-bottom:2px}
.rep-sub{font-size:11px;color:var(--sub);margin-bottom:14px}
.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rep-cell{background:var(--raise);border-radius:8px;padding:10px 12px}
.rep-cl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.rep-cv{font-size:15px;font-weight:800;color:var(--bright);margin-top:2px}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px;text-align:center}
.stat-v{font-size:22px;font-weight:900}
.stat-l{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.rsec{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.rsh{padding:10px 14px;background:var(--raise);font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
.rsr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px;color:var(--sub)}
.rsr:last-child{border-bottom:none}
.rsv{font-weight:700;color:var(--bright)}
.rep-btn{width:100%;background:var(--prot);border:none;border-radius:12px;padding:13px;color:var(--bg);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:8px}
.rep-btn2{width:100%;background:var(--raise);border:1px solid var(--line);border-radius:12px;padding:12px;color:var(--sub);font-size:13px;cursor:pointer;font-family:inherit}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 16px}
.empty-ico{font-size:44px;margin-bottom:12px}
.empty-txt{font-size:14px;color:var(--sub);line-height:1.7}

/* ── XP POP ── */
@keyframes xpPop{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-50px) scale(1.4);opacity:0}}
.xp-pop{position:fixed;pointer-events:none;font-size:20px;font-weight:900;color:var(--prot);z-index:500;animation:xpPop .8s ease-out forwards}

/* ── CELEBRATE ── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:998;display:none}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--bg2);border:2px solid var(--gold);box-shadow:0 20px 60px rgba(0,0,0,.15);border-radius:20px;padding:24px 28px;text-align:center;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:300px;width:90%}
.toast.on{transform:translate(-50%,-50%) scale(1)}
.toast-ico{font-size:48px;margin-bottom:8px}
.toast-title{font-size:20px;font-weight:900;color:#92400E;margin-bottom:6px}
.toast-msg{font-size:13px;color:var(--sub);line-height:1.5;margin-bottom:12px;white-space:pre-line}
.toast-xp{font-size:16px;font-weight:800;color:var(--prot);margin-bottom:14px}
.toast-close{background:var(--prot);border:none;border-radius:10px;padding:9px 22px;color:var(--bg);font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}

async function sbGet(path) {
  try {
    const r = await fetch(SB+path, {headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    if(!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

async function sbUpsert(table, body) {
  // Columnas de conflicto por tabla (para que PostgREST sepa qué constraint usar)
  const conflictCols = {
    'nl_days':  'user_key,date',
    'nl_sups':  'user_key,date',
    'nl_water': 'user_key,date',
    'nl_game':  'user_key',
  };
  const onConflict = conflictCols[table] || 'user_key,date';
  try {
    const r = await fetch(`${SB}/rest/v1/${table}?on_conflict=${onConflict}`, {
      method:'POST',
      headers:{
        'apikey':KEY,
        'Authorization':'Bearer '+KEY,
        'Content-Type':'application/json',
        'Prefer':'resolution=merge-duplicates,return=minimal'
      },
      body:JSON.stringify(body)
    });
    if(!r.ok) {
      const err = await r.text().catch(()=>'');
      console.warn('sbUpsert error',table,r.status,err);
      return false;
    }
    return true;
  } catch(e) {
    console.warn('sbUpsert catch',table,e.message);
    return false;
  }
}

async function loadFromSupabase() {
  const [days, sups, water, game] = await Promise.all([
    sbGet(`/rest/v1/nl_days?user_key=eq.${USER}&select=date,meals,updated_at&order=date.desc`),
    sbGet(`/rest/v1/nl_sups?user_key=eq.${USER}&select=date,data,updated_at`),
    sbGet(`/rest/v1/nl_water?user_key=eq.${USER}&select=date,glasses`),
    sbGet(`/rest/v1/nl_game?user_key=eq.${USER}&select=xp,unlocked_achs,last_date&limit=1`)
  ]);

  if(days) days.forEach(r=>{
    const localDay = DB.day(r.date);
    const localHasData = Object.values(localDay.meals).some(e=>e.length>0);
    const localTs = DB.get('ts_day_'+r.date) || 0; // timestamp del último guardado local
    const sbTs = r.updated_at ? new Date(r.updated_at).getTime() : 0;
    // Usar Supabase si:
    // 1. Local está vacío, O
    // 2. Supabase fue actualizado DESPUÉS del último guardado local (cambio externo)
    if(!localHasData || sbTs > localTs) {
      DB.set('day_'+r.date, {meals: r.meals||{breakfast:[],morning:[],lunch:[],afternoon:[],dinner:[]}});
      DB.set('ts_day_'+r.date, sbTs); // guardar timestamp de Supabase
    }
  });

  if(sups) sups.forEach(r=>{
    const localSups = DB.sups(r.date);
    const localHasData = Object.keys(localSups).length > 0;
    const localTs = DB.get('ts_sups_'+r.date) || 0;
    const sbTs = r.updated_at ? new Date(r.updated_at).getTime() : 0;
    if(!localHasData || sbTs > localTs) {
      DB.set('sups_'+r.date, r.data||{});
      DB.set('ts_sups_'+r.date, sbTs);
    }
  });

  if(water) water.forEach(r=>{
    if(!DB.water(r.date)) DB.set('water_'+r.date, r.glasses||0);
  });

  if(game&&game[0]) {
    const g=game[0];
    const localGame = DB.game();
    const finalXP = Math.max(g.xp||0, localGame.xp||0);
    const mergedAchs = [...new Set([...(g.unlocked_achs||[]),...(localGame.achs||[])])];
    DB.set('game',{xp:finalXP, achs:mergedAchs, lastDate:g.last_date||localGame.lastDate});
  }
}

async function saveDay(date) {
  const d = DB.day(date);
  const ok = await sbUpsert('nl_days',{user_key:USER,date,meals:d.meals});
  if(ok) DB.set('ts_day_'+date, Date.now()); // marcar cuándo guardó local
  return ok;
}
async function saveSups(date) {
  const ok = await sbUpsert('nl_sups',{user_key:USER,date,data:DB.sups(date)});
  if(ok) DB.set('ts_sups_'+date, Date.now());
  return ok;
}
async function saveWater(date) {
  return await sbUpsert('nl_water',{user_key:USER,date,glasses:DB.water(date)});
}
async function saveGame() {
  const g=DB.game();
  return await sbUpsert('nl_game',{user_key:USER,xp:g.xp,unlocked_achs:g.achs,last_date:g.lastDate});
}

const TODAY = () => {
  const n=new Date(), c=new Date(n.getTime()-5*3600000);
  return c.toISOString().split('T')[0];
};

const PROWHEY = {p:35,k:194,c:8,f:2};

function totals(date) {
  const d=DB.day(date), s=DB.sups(date);
  const pw = s.prowhey ? PROWHEY : {p:0,k:0,c:0,f:0};
  let t={p:pw.p,k:pw.k,c:pw.c,f:pw.f};
  MEALS.forEach(m=>(d.meals[m.id]||[]).forEach(e=>{t.p+=e.p||0;t.k+=e.k||0;t.c+=e.c||0;t.f+=e.f||0}));
  return t;
}

function streak() {
  const dates=DB.allDates(); if(!dates.length) return 0;
  let n=0; const today=TODAY();
  let d=new Date(today+'T12:00:00');
  for(let i=0;i<60;i++){
    const ds=d.toISOString().split('T')[0];
    const data=DB.day(ds);
    const has=Object.values(data.meals).some(e=>e.length>0);
    if(has){n++}else if(ds!==today){break}
    d.setDate(d.getDate()-1);
  }
  return n;
}

function getLevel(xp) {
  return LEVELS.slice().reverse().find(l=>xp>=l.min) || LEVELS[0];
}

function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('page'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='Resumen')  renderSum(sumDate);
  if(name==='Historial') renderHist();
  if(name==='Logros')    renderAch();
  if(name==='Informe')   renderRep();
}

// ═══════════════════════════════════════════════
//  HEADER
// ═══════════════════════════════════════════════
function updateHdr(t) {
  document.getElementById('hP').textContent = Math.round(t.p);
  document.getElementById('hK').textContent = Math.round(t.k);
  document.getElementById('hC').textContent = Math.round(t.c);
  document.getElementById('hF').textContent = Math.round(t.f);
  document.getElementById('hPb').style.width = Math.min(100,t.p/GOALS.p*100)+'%';
  document.getElementById('hKb').style.width = Math.min(100,t.k/GOALS.k*100)+'%';
  document.getElementById('hCb').style.width = Math.min(100,t.c/GOALS.c*100)+'%';
  document.getElementById('hFb').style.width = Math.min(100,t.f/GOALS.f*100)+'%';
}

function updateGame() {
  const g=DB.game(); const s=streak(); const lv=getLevel(g.xp);
  document.getElementById('streakNum').textContent = s;
  document.getElementById('xpNum').textContent = g.xp;
  document.getElementById('lvlTag').textContent = 'Nv'+lv.lvl;
}

// ═══════════════════════════════════════════════
//  HOY
// ═══════════════════════════════════════════════
function renderHoy() {
  renderMotiv();
  renderProgress();
  renderWater();
  renderHeatmap();
  renderMeals();
  renderSups();
  updateHdr(totals(TODAY()));
  updateGame();
}

function renderProgress() {
  const t=totals(TODAY());
  const pPct=Math.min(100,Math.round(t.p/GOALS.p*100));
  const kPct=Math.min(100,Math.round(t.k/GOALS.k*100));
  const cPct=Math.min(100,Math.round(t.c/GOALS.c*100));
  const fPct=Math.min(100,Math.round(t.f/GOALS.f*100));
  const score=Math.round(pPct*.45+kPct*.30+cPct*.15+fPct*.10);
  const scoreCol=score>=75?'var(--mint)':score>=50?'var(--amber)':'var(--coral)';
  function bar(pct,col,val,goal,unit){
    const over=pct>=100;
    return `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="font-weight:700;color:${col}">${val}${unit}</span>
        <span style="color:var(--muted)">meta ${goal}${unit} · <strong style="color:${over?'var(--mint)':'var(--body)'}">${pct}%</strong></span>
      </div>
      <div style="height:6px;background:var(--line);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${col};border-radius:3px;transition:width .4s"></div>
      </div>
    </div>`;
  }
  const el=document.getElementById('progressDiv');
  if(!el) return;
  el.innerHTML=`<div class="card" style="padding:14px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--sub)">Progreso de hoy</span>
      <span style="font-size:20px;font-weight:900;color:${scoreCol}">${score}<span style="font-size:11px;font-weight:600;color:var(--muted)">/100</span></span>
    </div>
    ${bar(pPct,'var(--prot)',Math.round(t.p),'90','g')}

function renderHeatmap() {
  const today=TODAY(); const dn=['D','L','M','M','J','V','S'];
  let html='';
  for(let i=6;i>=0;i--) {
    const d=new Date(today+'T12:00:00'); d.setDate(d.getDate()-i);
    const ds=d.toISOString().split('T')[0];
    const t=totals(ds); const pct=Math.min(100,t.p/GOALS.p*100);
    const col=pct>=85?'var(--mint)':pct>=50?'var(--amber)':pct>0?'var(--coral)':'var(--line)';
    const h=Math.max(3,pct*.4);
    html+=`<div class="hcell"><div class="hbar" style="height:${h}px;background:${col}"></div><div class="hlbl">${dn[d.getDay()]}</div></div>`;
  }
  document.getElementById('heatmapDiv').innerHTML=`<div class="heatmap">${html}</div>`;
}

function renderMeals() {
  const data=DB.day(TODAY()); let html='';
  MEALS.forEach(m=>{
    const entries=data.meals[m.id]||[];
    const has=entries.length>0;
    // chips de porciones
    let chips='';
    m.porciones.forEach(por=>{
      const cnt=entries.filter(e=>(e.g||e.grupo)===por.g).length;
      const cls=cnt>=por.m?'done':cnt>0?'part':'';
      chips+=`<span class="chip ${cls}">${cnt>=por.m?'✓':cnt+'/'+por.m} ${por.l}</span>`;
    });
    // entradas
    let rows='';
    if(!has) rows='<div class="emeal">Sin registros aún</div>';
    else rows=entries.map((e,i)=>{
      const fd=FOODS.find(f=>f.n===e.n);
      return `<div class="erow">
        <div><div class="ename">${e.n}</div>${fd?`<div class="ecat">${fd.cat}</div>`:''}</div>
        <div class="etags">
          <span class="tag tp">${e.p}P</span>
          <span class="tag tk">${e.k}k</span>
          <span class="tag tc">${e.c}C</span>
          <span class="tag tf">${e.f}G</span>
        </div>
        <button class="xbtn" onclick="delEntry('${m.id}',${i})">×</button>
      </div>`;
    }).join('');
    // totales
    let tots='';
    if(has) {
      const tp=entries.reduce((a,x)=>a+(x.p||0),0);
      const tk=entries.reduce((a,x)=>a+(x.k||0),0);
      const tc=entries.reduce((a,x)=>a+(x.c||0),0);
      const tf=entries.reduce((a,x)=>a+(x.f||0),0);
      tots=`<div class="mtots">
        <span class="tchip" style="color:var(--prot)">💪 ${tp}g P</span>
        <span class="tchip" style="color:var(--kcal)">🔥 ${tk} kcal</span>
        <span class="tchip" style="color:var(--carb)">🌾 ${tc}g C</span>
        <span class="tchip" style="color:var(--fat)">🥑 ${tf}g G</span>
      </div>`;
    }
    html+=`<div class="mblock">
      <div class="mhead">
        <div class="mpill ${has?'has':''}">${m.icon} ${m.name} <span class="dot"></span></div>
        <span class="mtime">${m.time}</span>
      </div>
      <div class="mcard">
        <div class="chips">${chips}</div>
        ${rows}

      ${tots}

      ${m.drink?`<div class="drink-tip">💧 Bebida después de esta comida · ${m.drink}</div>`:''}
    </div>`;

function openModal(mid, mname) {
  curMeal=mid;
  document.getElementById('modalTitle').textContent='+ '+mname;
  ['searchIn','mName','mP','mC','mF','mK'].forEach(id=>document.getElementById(id).value='');

}
function closeModal() { document.getElementById('modal').classList.remove('on'); curMeal=null; }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
document.getElementById('searchIn').addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(); });

function doSearch() {
  const q=document.getElementById('searchIn').value.toLowerCase().trim();
  const el=document.getElementById('results');
  if(!q) {
    const cats=[...new Set(FOODS.map(f=>f.cat))];
    el.innerHTML=cats.map(c=>`
      <div class="ritem" onclick="showCat('${c.replace(/'/g,"&#39;")}')">
        <div class="rname">${c}</div>
        <div class="rmeta">${FOODS.filter(f=>f.cat===c).length} alimentos</div>
      </div>`).join('');
    return;
  }
  if(q.length<2){el.innerHTML='';return}
  const res=FOODS.filter(f=>f.n.toLowerCase().includes(q)||(f.cat&&f.cat.toLowerCase().includes(q))).slice(0,14);
  if(!res.length){el.innerHTML='<div style="padding:10px;font-size:12px;color:var(--muted)">No encontrado — usa ingreso manual</div>';return}
  el.innerHTML=res.map(f=>`
    <div class="ritem" onclick='pickFood(${JSON.stringify(f).replace(/'/g,"&#39;")})'>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">
        <div class="rname">${f.n}</div><span class="rcat">${f.cat.replace(/^.+? /,'')}</span>
      </div>
      <div class="rmeta">
        <span class="rmeta-u">${f.u}</span>
        <span class="rmacro rmacro-p">💪 ${f.p}g P</span>
        <span class="rmacro rmacro-k">🔥 ${f.k} kcal</span>
        <span class="rmacro rmacro-c">🌾 ${f.c}g C</span>
        <span class="rmacro rmacro-f">🥑 ${f.f}g G</span>
      </div>
    </div>`).join('');
}

function showCat(cat) {
  document.getElementById('searchIn').value=cat.replace(/^.+? /,'');
  const el=document.getElementById('results');
  el.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px">
    <span>${cat}</span><span style="cursor:pointer;color:var(--mint)" onclick="document.getElementById('searchIn').value='';doSearch()">← Todas</span>
  </div>`+
  FOODS.filter(f=>f.cat===cat).map(f=>`
    <div class="ritem" onclick='pickFood(${JSON.stringify(f).replace(/'/g,"&#39;")})'>
      <div class="rname">${f.n}</div>
      <div class="rmeta">
        <span class="rmeta-u">${f.u}</span>
        <span class="rmacro rmacro-p">💪 ${f.p}g P</span>
        <span class="rmacro rmacro-k">🔥 ${f.k} kcal</span>
        <span class="rmacro rmacro-c">🌾 ${f.c}g C</span>
        <span class="rmacro rmacro-f">🥑 ${f.f}g G</span>
      </div>
    </div>`).join('');
}

function pickFood(f) {
  addEntry({n:f.n,p:f.p,k:f.k,c:f.c,f:f.f,u:f.u,g:f.g});
}

function saveManual() {
  const name=document.getElementById('mName').value.trim();
  if(!name){alert('Escribe el nombre');return}
  const p=Math.max(0,parseFloat(document.getElementById('mP').value)||0);
  const c=Math.max(0,parseFloat(document.getElementById('mC').value)||0);
  const f=Math.max(0,parseFloat(document.getElementById('mF').value)||0);
  let k=Math.max(0,parseFloat(document.getElementById('mK').value)||0);
  if(!k) k=Math.round(p*4+c*4+f*9);
  if(p===0&&c===0&&f===0&&k===0){
    if(!confirm('¿Registrar sin valores nutricionales?')) return;
  }
  addEntry({n:name,p,k,c,f,u:'manual',g:'mixto'});
}

async function addEntry(entry) {
  if(!curMeal) return;
  // Validar y limpiar macros — nunca guardar null o NaN
  const clean = {
    n: entry.n || 'Alimento',
    p: Math.max(0, parseFloat(entry.p) || 0),
    k: Math.max(0, parseFloat(entry.k) || 0),
    c: Math.max(0, parseFloat(entry.c) || 0),
    f: Math.max(0, parseFloat(entry.f) || 0),
    u: entry.u || '',
    g: entry.g || 'mixto'
  };
  // Si no hay kcal, calcular por fórmula
  if(!clean.k) clean.k = Math.round(clean.p*4 + clean.c*4 + clean.f*9);
  const data=DB.day(TODAY());
  if(!data.meals[curMeal]) data.meals[curMeal]=[];
  data.meals[curMeal].push(clean);
  DB.set('day_'+TODAY(),data);
  closeModal(); // cerrar modal inmediatamente para no bloquear UX
  const saved = await saveDay(TODAY());
  if(!saved) {
    // Si falla Supabase, el dato ya está en localStorage — no se pierde
    // Mostrar aviso discreto
    const tip=document.createElement('div');
    tip.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#FEF3C7;border:1px solid #F59E0B;border-radius:10px;padding:8px 16px;font-size:12px;font-weight:700;color:#92400E;z-index:300;white-space:nowrap';
    tip.textContent='⚠️ Guardado local. Sincronizará al reabrir';
    document.body.appendChild(tip);
    setTimeout(()=>tip.remove(),3000);
  }
  const xp=entry.g==='proteina'?12:entry.g==='verdura'?10:entry.g==='fruta'?8:5;
  addXP(xp); checkAchs();
  renderMeals(); updateHdr(totals(TODAY())); renderHeatmap(); renderProgress();
}

async function delEntry(mid, idx) {
  const data=DB.day(TODAY());
  data.meals[mid].splice(idx,1);
  DB.set('day_'+TODAY(),data);
  await saveDay(TODAY());
  renderMeals(); updateHdr(totals(TODAY())); renderHeatmap(); renderProgress();
}

function renderSum(date) {
  const dt=new Date(date+'T12:00:00');
  const DN=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MN=['enero','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  document.getElementById('sumLbl').textContent=`${DN[dt.getDay()]} ${dt.getDate()} ${MN[dt.getMonth()]}`;
  const t=totals(date); const s=DB.sups(date); const d2=DB.day(date);
  const has=Object.values(d2.meals).some(e=>e.length>0)||s.prowhey;
  if(!has) {
    document.getElementById('sumDiv').innerHTML='<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Sin registros para este día.<br>Ve a <b>Hoy</b> y agrega tus comidas.</div></div>';
    return;
  }
  const sc=Math.round(Math.min(100,t.p/GOALS.p*100)*.45+Math.min(100,t.k/GOALS.k*100)*.30+Math.min(100,t.c/GOALS.c*100)*.15+Math.min(100,t.f/GOALS.f*100)*.10);
  const cls=sc>=75?'great':sc>=50?'ok':'poor';
  const msg=sc>=75?'✨ ¡Excelente! Plan bien cumplido.':sc>=50?'👍 Buen día, hay áreas de mejora.':'⚠️ Día difícil — mañana es otra oportunidad.';
  const macros=[
    {l:'Proteína',v:t.p,g:GOALS.p,u:'g',col:'var(--prot)'},
    {l:'Calorías',v:t.k,g:GOALS.k,u:'kcal',col:'var(--kcal)'},
    {l:'Carbohid.',v:t.c,g:GOALS.c,u:'g',col:'var(--carb)'},
    {l:'Grasas',v:t.f,g:GOALS.f,u:'g',col:'var(--fat)'},
  ];
  const fbs=[];
  if(t.p>=GOALS.p*.9) fbs.push({c:'great',t:'✅ Meta de proteína alcanzada',m:`${Math.round(t.p)}g de ${GOALS.p}g — ¡clave para combatir la sarcopenia!`});
  else if(t.p>=GOALS.p*.7) fbs.push({c:'warn',t:'⚠️ Proteína cerca de meta',m:`${Math.round(t.p)}g de ${GOALS.p}g — faltan ${GOALS.p-Math.round(t.p)}g. ¿Tomaste el Prowhey?`});
  else fbs.push({c:'bad',t:'❌ Proteína insuficiente',m:`${Math.round(t.p)}g de ${GOALS.p}g — déficit de ${GOALS.p-Math.round(t.p)}g.`});
  if(t.k>=GOALS.k*.85&&t.k<=GOALS.k*1.1) fbs.push({c:'great',t:'✅ Calorías en rango',m:`${Math.round(t.k)} kcal de ${GOALS.k} establecidas.`});
  else if(t.k<GOALS.k*.7) fbs.push({c:'warn',t:'⚠️ Calorías muy bajas',m:`${Math.round(t.k)} kcal — comer poco aumenta la pérdida muscular.`});
  const supDone=SUPS.filter(x=>s[x.id]).length;
  if(supDone===SUPS.length) fbs.push({c:'great',t:'✅ Todos los suplementos tomados',m:'Prowhey, Vitamina D3, Omega 3, Bariatric Fusion y Creatina — ¡perfecto!'});
  else if(s.prowhey) fbs.push({c:'warn',t:'⚠️ Suplementos incompletos',m:`Prowhey ✓ · ${supDone} de ${SUPS.length} tomados.`});
  else fbs.push({c:'bad',t:'❌ Prowhey no registrado',m:'Sin el Prowhey es muy difícil llegar a los 90g de proteína.'});

  document.getElementById('sumDiv').innerHTML=`
    <div class="score-ring">
      <div class="ring ${cls}">
        <div class="score-num ${cls}">${sc}</div>
        <div class="score-den">/ 100</div>
      </div>
      <div class="score-msg">${msg}</div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px">
      ${macros.map(m=>{const pct=Math.min(100,Math.round(m.v/m.g*100));return`
        <div class="mbar-row">
          <div class="mbar-lbl">${m.l}</div>
          <div class="mbar-track"><div class="mbar-fill" style="width:${pct}%;background:${m.col}"></div></div>
          <div class="mbar-val" style="color:${m.col}">${Math.round(m.v)}${m.u}</div>
        </div>`}).join('')}
    </div>
    ${fbs.map(f=>`<div class="fbcard ${f.c}"><div class="fbt ${f.c}">${f.t}</div><div class="fbm">${f.m}</div></div>`).join('')}`;
}

          </div>
          <div class="hdbars">
            <div class="hb" title="Proteína"><div class="hbf" style="width:${Math.min(100,t.p/GOALS.p*100).toFixed(0)}%;background:var(--prot)"></div></div>
            <div class="hb" title="Calorías"><div class="hbf" style="width:${Math.min(100,t.k/GOALS.k*100).toFixed(0)}%;background:var(--kcal)"></div></div>
            <div class="hb" title="Carbos"><div class="hbf" style="width:${Math.min(100,t.c/GOALS.c*100).toFixed(0)}%;background:var(--carb)"></div></div>
          </div>
        </div>
      </div>
      ${mealRows?`<div class="hd-meals">${mealRows}</div>`:''}
      <div class="hd-sups">${supRow}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
//  LOGROS
// ═══════════════════════════════════════════════
function getStats() {
  const dates=DB.allDates(); let entries=0,protDays=0,supDays=0,pwDays=[];
  dates.forEach(date=>{
    const d=DB.day(date); let p=0;
    MEALS.forEach(m=>(d.meals[m.id]||[]).forEach(e=>{p+=e.p||0;entries++}));
    if(p>=GOALS.p*.9) protDays++;
    const s=DB.sups(date);
    if(SUPS.every(x=>s[x.id])) supDays++;
    if(s.prowhey) pwDays.push(date);
  });
  let pwStreak=0; const today=TODAY(); let dd=new Date(today+'T12:00:00');
  for(let i=0;i<60;i++){const ds=dd.toISOString().split('T')[0];if(pwDays.includes(ds)){pwStreak++}else if(ds!==today){break}dd.setDate(dd.getDate()-1);}
  const s=streak(); const g=DB.game(); const lv=getLevel(g.xp);
  return{entries,protDays,supDays,pwStreak,streak:s,level:lv.lvl};
}

function renderAch() {
  const g=DB.game(); const s=streak(); const lv=getLevel(g.xp); const unlocked=g.achs||[];
  const nextLv=LEVELS.find(l=>l.lvl===lv.lvl+1)||lv;
  const pct=lv.lvl===8?100:Math.round((g.xp-lv.min)/(nextLv.min-lv.min)*100);
  document.getElementById('achDiv').innerHTML=`
    <div class="card" style="padding:16px;margin-bottom:14px;text-align:center">
      <div style="font-size:32px;margin-bottom:6px">${lv.name.split(' ')[1]||'🌱'}</div>
      <div style="font-size:18px;font-weight:900;color:var(--gold)">${lv.name}</div>
      <div style="font-size:12px;color:var(--sub);margin-top:4px">${g.xp} XP · Racha de ${s} días 🔥</div>
      <div style="margin-top:12px;height:6px;background:var(--line);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--lilac),var(--mint));border-radius:3px"></div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px">${g.xp} / ${nextLv.min} XP para ${nextLv.name}</div>
    </div>
    <div class="ach-grid">
      ${ACHIEVEMENTS.map(a=>{
        const done=unlocked.includes(a.id);
        return`<div class="ach ${done?'done':'locked'}">
          ${done&&a.xp?`<div class="ach-xp">+${a.xp}XP</div>`:''}
          <div class="ach-ico">${a.ico}</div>
          <div class="ach-name">${a.name}</div>
          <div class="ach-desc">${done?a.desc:'???'}</div>
        </div>`;
      }).join('')}
    </div>`;
}

// ═══════════════════════════════════════════════
//  INFORME
// ═══════════════════════════════════════════════
function renderRep() {
  const dates=DB.allDates();

  allDays.forEach(date=>{
    const t=totals(date); const d=DB.day(date); const s=DB.sups(date);

    if(has2){dl++;tp+=t.p;tk+=t.k;tc+=t.c;tf+=t.f;if(t.p>=GOALS.p*.85)mp++;rows.push({date,p:t.p,k:t.k,c:t.c,f:t.f,s})}
  });

  const pcP=dl?Math.round(mp/dl*100):0;
  const str=streak(); const g=DB.game(); const lv=getLevel(g.xp);
  const MN=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const DN=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const fd=new Date(rows[0].date+'T12:00:00'),ld=new Date(rows[rows.length-1].date+'T12:00:00');

  // Tabla completa por día
  const tableRows = rows.map(r=>{
    const dt=new Date(r.date+'T12:00:00');
    const okP=r.p>=GOALS.p*.85;
    const okK=r.k>=GOALS.k*.75&&r.k<=GOALS.k*1.15;
    const pw=r.s&&r.s.prowhey?'✓':'—';
    return `<tr>
      <td style="font-weight:700;white-space:nowrap">${DN[dt.getDay()]} ${dt.getDate()} ${MN[dt.getMonth()]}</td>
      <td style="color:${okP?'#1A7A57':'#C0392B'};font-weight:700;text-align:right">${Math.round(r.p)}g</td>
      <td style="text-align:right">${Math.round(r.k)}</td>
      <td style="text-align:right">${Math.round(r.c)}g</td>
      <td style="text-align:right">${Math.round(r.f)}g</td>
      <td style="text-align:center;color:${okP?'#059669':'#9CA3AF'}">${pw}</td>
    </tr>`;
  }).join('');

  document.getElementById('repDiv').innerHTML=`
    <div class="rep-top">
      <div class="rep-name">Informe Nutricional</div>
      <div class="rep-sub">Paola Gaviria V. · Plan: Angie Burbano Q. · Nutricionista Deportiva</div>
      <div class="rep-grid">
        <div class="rep-cell"><div class="rep-cl">Período</div><div class="rep-cv" style="font-size:12px">${fd.getDate()} ${MN[fd.getMonth()]} – ${ld.getDate()} ${MN[ld.getMonth()]}</div></div>
        <div class="rep-cell"><div class="rep-cl">Días registrados</div><div class="rep-cv">${dl}</div></div>
        <div class="rep-cell"><div class="rep-cl">Adherencia prot.</div><div class="rep-cv" style="color:${pcP>=75?'var(--prot)':'var(--warn)'}">${pcP}%</div></div>
        <div class="rep-cell"><div class="rep-cl">Racha actual</div><div class="rep-cv" style="color:var(--amber)">${str} días 🔥</div></div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-v" style="color:var(--prot)">${avgP}g</div><div class="stat-l">Prot. prom.<br><small style="color:var(--muted)">meta 90g</small></div></div>
      <div class="stat"><div class="stat-v" style="color:var(--kcal)">${avgK}</div><div class="stat-l">kcal prom.<br><small style="color:var(--muted)">meta 1650</small></div></div>
      <div class="stat"><div class="stat-v" style="color:var(--carb)">${avgC}g</div><div class="stat-l">Carb. prom.<br><small style="color:var(--muted)">meta 145g</small></div></div>
    </div>

    <!-- TABLA COMPLETA -->
    <div class="rsec" style="overflow-x:auto">
      <div class="rsh">📋 Registro completo de todos los días</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="background:var(--raise)">
            <th style="padding:8px 10px;text-align:left;font-size:10px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase">Fecha</th>
            <th style="padding:8px 6px;text-align:right;font-size:10px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase">Prot.</th>
            <th style="padding:8px 6px;text-align:right;font-size:10px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase">kcal</th>
            <th style="padding:8px 6px;text-align:right;font-size:10px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase">Carb.</th>
            <th style="padding:8px 6px;text-align:right;font-size:10px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase">Gras.</th>
            <th style="padding:8px 6px;text-align:center;font-size:10px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase">PW</th>
          </tr>
        </thead>
        <tbody style="color:var(--body)">
          ${tableRows}
          <tr style="background:var(--raise);font-weight:800;border-top:2px solid var(--line2)">
            <td style="padding:8px 10px;font-size:11px;color:var(--sub)">PROMEDIO</td>
            <td style="padding:8px 6px;text-align:right;color:${avgP>=GOALS.p*.85?'#059669':'#DC2626'}">${avgP}g</td>
            <td style="padding:8px 6px;text-align:right">${avgK}</td>
            <td style="padding:8px 6px;text-align:right">${avgC}g</td>
            <td style="padding:8px 6px;text-align:right">${avgF}g</td>
            <td style="padding:8px 6px;text-align:center">—</td>
          </tr>
          <tr style="background:#F0F7F4;font-size:10px;color:var(--muted)">
            <td style="padding:6px 10px;font-style:italic">META</td>
            <td style="padding:6px 6px;text-align:right;color:#059669;font-weight:700">90g</td>
            <td style="padding:6px 6px;text-align:right;font-weight:700">1650</td>
            <td style="padding:6px 6px;text-align:right;font-weight:700">145g</td>
            <td style="padding:6px 6px;text-align:right;font-weight:700">58g</td>
            <td style="padding:6px 6px"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="rsec">
      <div class="rsh">Progreso NutriLog</div>
      <div class="rsr"><span>Nivel</span><span class="rsv" style="color:var(--gold)">${lv.name}</span></div>
      <div class="rsr"><span>XP total</span><span class="rsv" style="color:var(--carb)">${g.xp} XP</span></div>
      <div class="rsr"><span>Logros</span><span class="rsv" style="color:var(--warn)">${(g.achs||[]).length} / ${ACHIEVEMENTS.length}</span></div>
    </div>
    <button class="rep-btn" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
    <button class="rep-btn2" onclick="copyRep()" style="margin-top:8px">📋 Copiar para WhatsApp</button>
    <div id="copyOk" style="display:none;text-align:center;color:var(--mint);font-size:12px;margin-top:8px">✓ Copiado</div>`;
}

function copyRep() {
  const dates=DB.allDates(); let dl=0,tp=0,mp=0;
  dates.forEach(date=>{const t=totals(date);const d=DB.day(date);const s=DB.sups(date);if(Object.values(d.meals).some(e=>e.length>0)||s.prowhey){dl++;tp+=t.p;if(t.p>=GOALS.p*.85)mp++}});
  const avgP=dl?Math.round(tp/dl):0, pct=dl?Math.round(mp/dl*100):0;
  const g=DB.game(); const lv=getLevel(g.xp); const s=streak();
  navigator.clipboard.writeText(`📊 INFORME NUTRICIONAL — Paola Gaviria V.\n\nDías registrados: ${dl}\nProteína promedio: ${avgP}g / 90g meta\nAdherencia proteína: ${pct}% de los días\nRacha actual: ${s} días 🔥\nNivel NutriLog: ${lv.name} (${g.xp} XP)\n\nPlan: Angie Stephania Burbano Q. · Nutricionista Deportiva`).then(()=>{const m=document.getElementById('copyOk');if(m){m.style.display='block';setTimeout(()=>m.style.display='none',2500)}});
}

// ═══════════════════════════════════════════════
//  GAMIFICACIÓN
// ═══════════════════════════════════════════════
function addXP(amount) {
  const g=DB.game(); const oldLv=getLevel(g.xp).lvl;
  g.xp+=amount; DB.set('game',g); saveGame();
  const newLv=getLevel(g.xp).lvl;
  // XP pop
  const pop=document.createElement('div');
  pop.className='xp-pop'; pop.textContent='+'+amount+' XP';
  pop.style.left=(window.innerWidth/2-30)+'px'; pop.style.top=(window.innerHeight/2)+'px';
  document.body.appendChild(pop); setTimeout(()=>pop.remove(),900);
  updateGame();
  if(newLv>oldLv) setTimeout(()=>showToast('🎊','¡Subiste de nivel!','Ahora eres: '+getLevel(g.xp).name,0),500);
}

function checkAchs() {
  const stats=getStats(); const g=DB.game();
  let changed=false;
  for(const a of ACHIEVEMENTS) {
    if(!(g.achs||[]).includes(a.id) && a.check(stats)) {
      if(!g.achs) g.achs=[];
      g.achs.push(a.id);
      if(a.xp>0) g.xp+=a.xp;
      changed=true;
      setTimeout(()=>showToast(a.ico,'¡Logro desbloqueado!',a.name+'\n'+a.desc,a.xp),300);
    }
  }
  if(changed){DB.set('game',g); saveGame(); updateGame();}
}

// ═══════════════════════════════════════════════
//  CONFETTI & TOAST
// ═══════════════════════════════════════════════
function showToast(ico,title,msg,xp) {
  document.getElementById('toastIco').textContent=ico;
  document.getElementById('toastTitle').textContent=title;
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastXp').textContent=xp>0?'+'+xp+' XP ✨':'';
  document.getElementById('toast').classList.add('on');
  launchConfetti();
}
function closeToast() {
  document.getElementById('toast').classList.remove('on');
  if(confettiAnim){cancelAnimationFrame(confettiAnim);confettiAnim=null;}
  const cv=document.getElementById('confetti-canvas');
  cv.style.display='none';
  cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
}
function launchConfetti() {
  const cv=document.getElementById('confetti-canvas');
  cv.style.display='block'; cv.width=window.innerWidth; cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const cols=['#5FE0A0','#FFB84D','#B87FFF','#5BC8FF','#FF6B6B','#FFD966'];
  const ps=Array.from({length:80},()=>({x:Math.random()*cv.width,y:-10,vx:(Math.random()-.5)*4,vy:Math.random()*3+2,col:cols[Math.floor(Math.random()*cols.length)],sz:Math.random()*8+4,rot:Math.random()*360,rv:(Math.random()-.5)*8,sh:Math.random()>.5}));
  function frame(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.vy+=.05;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.col;if(p.sh){ctx.beginPath();ctx.arc(0,0,p.sz/2,0,Math.PI*2);ctx.fill()}else{ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2)}ctx.restore();});
    if(ps.some(p=>p.y<cv.height+20)) confettiAnim=requestAnimationFrame(frame);
    else cv.style.display='none';
  }
  confettiAnim=requestAnimationFrame(frame);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init() {
  // 1. Renderizar inmediatamente con lo que haya en localStorage
  renderHoy();
  renderSum(sumDate);

  // 2. Sync con Supabase
  loadFromSupabase().then(()=>{
    // Subir a Supabase cualquier dato local que Supabase no tenga aún
    const localDates = DB.allDates();
    localDates.forEach(date=>{
      const d = DB.day(date);
      const hasData = Object.values(d.meals).some(e=>e.length>0);
      if(hasData) saveDay(date); // sync silencioso — sube lo que haya local
      const s = DB.sups(date);
      if(Object.keys(s).length>0) saveSups(date);
    });

    // XP diario
    const g=DB.game();
    if(g.lastDate!==TODAY()){
      g.lastDate=TODAY();
      DB.set('game',g);
      saveGame();
      addXP(5);
      checkAchs();
    }

    // Re-renderizar con datos completos
    renderHoy();
    renderSum(sumDate);
  }).catch(()=>{
    // Sin conexión — funciona solo con localStorage
    const g=DB.game();
    if(g.lastDate!==TODAY()){g.lastDate=TODAY();DB.set('game',g);addXP(5);checkAchs();}
    renderHoy();
  });
}

init();
</script>
